id: com.valvesoftware.Steam.Utility.Spout2PW
runtime: com.valvesoftware.Steam
runtime-version: stable
branch: stable
sdk: org.freedesktop.Sdk//25.08
build-extension: true
separate-locales: false
sdk-extensions:
  - org.freedesktop.Sdk.Extension.mingw-w64
build-options:
  strip: true
  prefix: /app/utils/Spout2PW
  append-path: /usr/lib/sdk/mingw-w64/bin
modules:
  - name: spout2pw
    buildsystem: simple
    build-options:
      strip: true
      prepend-path: /run/build/spout2pw/wine/bin
      env:
        LDFLAGS: ""
    build-commands:
      - chmod +x build.sh
      - ./build.sh
      - mkdir -p ${FLATPAK_DEST}/share/spout2pw
      - cp -a build/pkg/* ${FLATPAK_DEST}/share/spout2pw/
      - chmod +x ${FLATPAK_DEST}/share/spout2pw/spout2pw.sh
      - mkdir -p ${FLATPAK_DEST}/bin
      - ln -sf ../share/spout2pw/spout2pw.sh ${FLATPAK_DEST}/bin/spout2pw
    post-install:
      - install -Dpm0644 -t ${FLATPAK_DEST}/share/metainfo ${FLATPAK_ID}.metainfo.xml
    sources:
      - type: git
        url: https://github.com/hoshinolina/spout2pw.git
        tag: 0.1.7
        commit: fe7c95bacb3a141270ea91a9d7cd126bf6feafd3
        x-checker-data:
          type: git
          is-main-source: true
          tag-pattern: ^([\d.]+)$
      - type: archive
        url: https://master.dl.sourceforge.net/project/wine/Slackware%20Packages/11.0/x86_64/wine-11.0-x86_64-1sg.txz
        sha256: 5a57406ffffff71337da0e69b8ef36d64be18055911a50ce32b202d8d9e5218e
        dest: wine
      - type: file
        path: com.valvesoftware.Steam.Utility.Spout2PW.metainfo.xml
